<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ZanGID — чат с AI-помощником по законодательству Казахстана.">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg viewBox='0 0 64 78' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='32' cy='46' r='28' stroke='%231D9E75' stroke-width='2.5'/%3E%3Ccircle cx='32' cy='46' r='2.5' fill='%231D9E75'/%3E%3C/svg%3E">
  <title>Чат — ZanGID</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/chat.css">
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
</head>
<body>

  <!-- Навбар чата -->
  <nav class="navbar" id="navbar">
    <div class="navbar-inner">
      <a href="index.html" class="navbar-logo">
        <div class="navbar-logo-icon">
          <svg viewBox="0 0 64 78" fill="none" xmlns="http://www.w3.org/2000/svg">
            <g stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
              <rect x="26" y="1" width="12" height="8" rx="2" stroke-width="2.5"/>
              <line x1="27" y1="3.5" x2="37" y2="3.5" stroke-width="1.2"/>
              <line x1="27" y1="6" x2="37" y2="6" stroke-width="1.2"/>
              <path d="M29 9 Q29 16 32 16 Q35 16 35 9" stroke-width="2" fill="none"/>
              <circle cx="32" cy="46" r="28" stroke-width="2.5"/>
              <circle cx="32" cy="46" r="21" stroke-width="1.8"/>
              <g transform="rotate(45, 32, 46)">
                <path d="M32 32 L39 46 L32 60 L25 46 Z" stroke-width="1.8" fill="none"/>
              </g>
              <circle cx="32" cy="46" r="2.5" fill="currentColor" stroke="none"/>
              <line x1="32" y1="18" x2="32" y2="25" stroke-width="2"/>
              <line x1="32" y1="67" x2="32" y2="74" stroke-width="2"/>
              <line x1="4" y1="46" x2="11" y2="46" stroke-width="2"/>
              <line x1="53" y1="46" x2="60" y2="46" stroke-width="2"/>
            </g>
          </svg>
        </div>
        ZanGID
      </a>
      <div class="navbar-nav" id="navbarNav">
        <a href="dashboard.html" class="navbar-link auth-user">Дашборд</a>
        <a href="about.html" class="navbar-link">О нас</a>
        <a href="support.html" class="navbar-link">Поддержка</a>
      </div>

      <div class="navbar-actions">
        <a href="login.html" class="btn btn-outline auth-guest" style="padding: 8px 16px; font-size: 0.875rem; border-radius: var(--radius-pill);">Войти</a>
        <!-- Пользовательское меню -->
        <div class="user-menu auth-user">
          <button class="user-menu-btn" id="userMenuBtn">
            <div class="user-avatar user-identity-pending">…</div>
          </button>
          <div class="user-dropdown" id="userDropdown">
            <div class="dropdown-header">
              <div class="dropdown-name user-identity-pending">…</div>
              <div class="dropdown-email user-identity-pending">…</div>
            </div>
            <a href="dashboard.html" class="dropdown-item">
              <span class="dropdown-icon">📊</span> Панель управления
            </a>
            <a href="history.html" class="dropdown-item">
              <span class="dropdown-icon">🕒</span> История чатов
            </a>
            <a href="profile.html" class="dropdown-item">
              <span class="dropdown-icon">⚙️</span> Настройки
            </a>
            <div class="dropdown-divider"></div>
            <a href="index.html" class="dropdown-item text-danger logout-btn">
              <span class="dropdown-icon">🚪</span> Выйти
            </a>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <!-- Layout чата -->
  <div class="chat-layout">

    <!-- Сайдбар -->
    <aside class="chat-sidebar" id="chatSidebar">
      <div class="sidebar-header">
        <button class="btn btn-primary" id="newChatBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          Новый чат
        </button>
      </div>

      <div class="sidebar-list" id="sidebarList">
        <div class="sidebar-label">История запросов</div>
      </div>
    </aside>

    <!-- Основная область чата -->
    <main class="chat-main">
      <!-- Заголовок чата -->
      <div class="chat-header">
        <div style="display: flex; align-items: center; gap: 12px;">
          <button class="sidebar-toggle-btn" id="sidebarToggle" aria-label="Открыть сайдбар">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <line x1="3" y1="6" x2="21" y2="6"/>
              <line x1="3" y1="12" x2="21" y2="12"/>
              <line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
          </button>
          <h2 class="chat-header-title" id="chatTitle">Новый чат</h2>
        </div>
      </div>

      <!-- Сообщения -->
      <div class="chat-messages" id="chatMessages"></div>

      <!-- Поле ввода -->
      <div class="chat-input-area">
        <div class="chat-input-wrapper">
          <input type="text" placeholder="Задайте вопрос о законах..." id="chatInput">
          <button class="chat-send-btn" id="chatSendBtn" aria-label="Отправить">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>
      </div>
    </main>

  </div>

  <script src="js/app.js"></script>
  <script src="js/chat.js"></script>
</body>
</html>
