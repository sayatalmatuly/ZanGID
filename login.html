<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Вход в ZanGID — AI-навигатор по законодательству Казахстана.">
  <title>Вход — ZanGID</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/login.css">
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
</head>
<body>

  <!-- Полноэкранная страница входа -->
  <div class="login-page">
    <div class="login-card" id="loginCard">

      <!-- Логотип -->
      <div class="login-logo">
        <div class="login-logo-icon">
          <svg viewBox="0 0 64 78" fill="none" xmlns="http://www.w3.org/2000/svg">
            <g stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
              <rect x="26" y="1" width="12" height="8" rx="2" stroke-width="2.5"/>
              <line x1="27" y1="3.5" x2="37" y2="3.5" stroke-width="1.2"/>
              <line x1="27" y1="6" x2="37" y2="6" stroke-width="1.2"/>
              <path d="M29 9 Q29 16 32 16 Q35 16 35 9" stroke-width="2" fill="none"/>
              <circle cx="32" cy="46" r="28" stroke-width="2.5"/>
              <circle cx="32" cy="46" r="21" stroke-width="1.8"/>
              <g transform="rotate(45, 32, 46)">
                <path d="M32 32 L39 46 L32 60 L25 46 Z" stroke-width="1.8" fill="none"/>
              </g>
              <circle cx="32" cy="46" r="2.5" fill="currentColor" stroke="none"/>
              <line x1="32" y1="18" x2="32" y2="25" stroke-width="2"/>
              <line x1="32" y1="67" x2="32" y2="74" stroke-width="2"/>
              <line x1="4" y1="46" x2="11" y2="46" stroke-width="2"/>
              <line x1="53" y1="46" x2="60" y2="46" stroke-width="2"/>
            </g>
          </svg>
        </div>
        <h2 id="loginTitle">Войти в ZanGID</h2>
        <p id="loginSubtitle">Получите доступ к AI-навигатору по законам</p>
      </div>

      <!-- Форма -->
      <form class="login-form" id="loginForm">

        <!-- Поле имени (только при регистрации) -->
        <div class="form-group hidden" id="nameGroup">
          <label class="form-label" for="nameInput">Имя</label>
          <input type="text" class="form-input" id="nameInput" placeholder="Ваше имя">
        </div>

        <div class="form-group">
          <label class="form-label" for="emailInput">Email</label>
          <input type="email" class="form-input" id="emailInput" placeholder="example@mail.com" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="passwordInput">Пароль</label>
          <div class="form-input-wrapper">
            <input type="password" class="form-input" id="passwordInput" placeholder="Введите пароль" required>
            <span class="form-input-icon" id="togglePassword" title="Показать пароль">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </span>
          </div>
        </div>

        <!-- TODO: Supabase auth - signIn() -->
        <!-- TODO: Supabase auth - signUp() -->
        <button type="submit" class="login-btn" id="loginBtn">Войти</button>

        <!-- Разделитель -->
        <div class="login-divider">
          <span class="login-divider-line"></span>
          <span class="login-divider-text">или</span>
          <span class="login-divider-line"></span>
        </div>

        <!-- Google OAuth -->
        <!-- TODO: Supabase auth - signInWithOAuth Google -->
        <button type="button" class="oauth-btn" id="googleBtn">
          <svg class="oauth-icon" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Войти через Google
        </button>
      </form>

      <!-- Переключатель -->
      <div class="login-switch">
        <span id="switchText">Нет аккаунта?</span>
        <a href="#" id="switchLink">Зарегистрироваться</a>
      </div>

    </div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
